name: Test .NET

on:
    push:
        branches:
            - main
        paths-ignore:
            - '*.md'
            - 'Docs/**'
            - 'Examples/**'
            - '.gitignore'
    pull_request:
        branches:
            - main
    workflow_dispatch:
        inputs:
            run_real_dns_tests:
                description: 'Run live-host DNS integration tests'
                required: false
                default: false
                type: boolean

permissions:
    contents: read

env:
    DOTNET_VERSION: '10.x'
    BUILD_CONFIGURATION: 'Release'
    TEST_VERBOSITY: minimal # set to 'detailed' to restore full test output
    SUMMARIZE_FAILURES: true # set to 'false' to disable summarizing failing tests

jobs:
    test-windows:
        name: 'Windows'
        runs-on: windows-latest
        timeout-minutes: 10
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore dependencies
              run: dotnet restore DnsClientX.sln

            - name: Build solution
              run: dotnet build DnsClientX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run tests (.NET Framework 4.7.2)
              run: dotnet test DnsClientX.Tests/DnsClientX.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework net472 --no-build --verbosity ${{ env.TEST_VERBOSITY }} --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx
              env:
                  DNSCLIENTX_DEBUG_SYSTEMDNS: '1'

            - name: Run tests (.NET 10.0)
              run: dotnet test DnsClientX.Tests/DnsClientX.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --framework net10.0 --no-build --verbosity ${{ env.TEST_VERBOSITY }} --logger "console;verbosity=${{ env.TEST_VERBOSITY }}" --logger trx --collect:"XPlat Code Coverage"
              env:
                  DNSCLIENTX_DEBUG_SYSTEMDNS: '1'

            - name: Summarize failing tests
              if: failure() && env.SUMMARIZE_FAILURES == 'true'
              shell: pwsh
              run: |
                  $trxFiles = Get-ChildItem -Recurse -Filter *.trx
                  if ($trxFiles.Count -eq 0) {
                    Write-Host "No TRX files found for failure analysis"
                    exit 0
                  }

                  Write-Host "=== Failed Tests Summary ==="
                  $failureCount = 0

                  $trxFiles | ForEach-Object {
                    try {
                      Select-Xml -Path $_.FullName -XPath "//UnitTestResult[@outcome='Failed']" |
                        ForEach-Object {
                          $name = $_.Node.testName
                          $msg = $_.Node.Output.ErrorInfo.Message ?? "No error message available"
                          Write-Host "❌ $name"
                          Write-Host "   $msg"
                          $failureCount++
                        }
                    } catch {
                      Write-Host "Warning: Could not parse TRX file $($_.Name): $($_.Exception.Message)"
                    }
                  }

                  if ($failureCount -eq 0) {
                    Write-Host "No failed tests found in TRX files"
                  } else {
                    Write-Host "=== Total failed tests: $failureCount ==="
                  }

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-results-windows
                  path: '**/*.trx'

            - name: Upload coverage reports
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: coverage-reports-windows
                  path: '**/coverage.cobertura.xml'

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                  files: '**/coverage.cobertura.xml'
                  fail_ci_if_error: false

    test-ubuntu:
        name: 'Ubuntu'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

