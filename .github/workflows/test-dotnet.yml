                  fail_ci_if_error: false

    test-macos:
        name: 'macOS'
        runs-on: macos-latest
        timeout-minutes: 10
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
