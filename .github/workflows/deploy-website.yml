name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "Website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

jobs:
  website-deploy:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-deploy.yml@4a8c9b3a69e505dab381db94b602cd3d70406cae
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      site_output_path: Website/_site
      engine_mode: source
      runner_labels_json: '["ubuntu-latest"]'
      powerforge_repository: EvotecIT/PSPublishModule
      powerforge_ref: 4a8c9b3a69e505dab381db94b602cd3d70406cae
    secrets:
      indexnow_key: ${{ secrets.INDEXNOW_KEY }}
