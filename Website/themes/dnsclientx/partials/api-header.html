<header class="imo-header imo-header--api">
  <div class="imo-container imo-header__inner">
    <a class="imo-header__logo" href="/">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <circle cx="14" cy="14" r="11" stroke="currentColor" stroke-width="2" opacity="0.28"/>
        <circle cx="8" cy="14" r="2" fill="currentColor"/>
        <circle cx="20" cy="8" r="2" fill="currentColor"/>
        <circle cx="20" cy="20" r="2" fill="currentColor"/>
        <path d="M9.8 13.2L18.2 8.8M9.8 14.8l8.4 4.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>DnsClientX</span>
    </a>

    <button class="imo-hamburger" type="button" aria-label="Toggle navigation">
      <span class="imo-hamburger__line"></span>
      <span class="imo-hamburger__line"></span>
      <span class="imo-hamburger__line"></span>
    </button>

    <nav class="imo-nav api-nav" aria-label="Main navigation">
      {{NAV_LINKS}}
    </nav>

    <div class="imo-header__actions api-header__actions">
      <button class="imo-theme-toggle" type="button" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      {{NAV_ACTIONS}}
    </div>
  </div>
</header>
